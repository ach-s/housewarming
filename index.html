<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Housewarming — Events</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="brand">Housewarming</h1>
    </div>
  </header>

  <main class="container">
    <section class="event-list" aria-label="Events">
      <article class="event-card" role="article">
        <h2 class="title">Housewarming — Saturday 24 July</h2>
        <p class="meta">Starts 6:00 PM — 123 Home Street</p>
        <p class="desc">Come celebrate the new place! Food and drinks provided. Click to RSVP.</p>
        <div class="controls">
          <a class="btn btn--primary" href="event.html">View event</a>
        </div>
      </article>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
