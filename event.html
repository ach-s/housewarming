<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Housewarming — RSVP</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="brand">Housewarming</a>
    </div>
  </header>

  <main class="container">
    <article class="event-card event-detail" aria-labelledby="event-title">
      <h1 id="event-title" class="title">Housewarming — Saturday 24 July</h1>
      <p class="meta">6:00 PM — 123 Home Street</p>
      <p class="desc">Join us for drinks, snacks and a tour of the new place.</p>

      <form id="rsvp-form" class="rsvp-form" novalidate>
        <label for="name">Your name</label>
        <input id="name" name="name" list="names-list" type="text" required placeholder="First and last name" autocomplete="name" />
        <datalist id="names-list"></datalist>

        <p class="question">Can you come?</p>
        <div class="choices" role="radiogroup" aria-labelledby="event-title">
          <label class="choice"><input type="radio" name="answer" value="yes"> Yes</label>
          <label class="choice"><input type="radio" name="answer" value="no"> No</label>
        </div>

        <label for="plus_one">Plus one (name)</label>
        <input id="plus_one" name="plus_one" type="text" placeholder="Partner or guest name" />

        <p class="hint">Start typing to pick an existing guest (loads last response). You can update your response any time.</p>

        <div class="form-actions">
          <button type="submit" class="btn btn--primary">Save response</button>
          <button type="button" id="btn-cancel" class="btn btn--secondary">Cancel</button>
        </div>

        <div id="status" role="status" aria-live="polite" class="status"></div>
      </form>

      <section class="attendees">
        <h2>Current RSVPs</h2>
        <div id="attendees-list">Loading…</div>
      </section>
    </article>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
